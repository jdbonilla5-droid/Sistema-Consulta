<!DOCTYPE html>
<html>
<head>
    <title>Sistema de Consulta</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 70%;
            background: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ccc;
        }

        th {
            background: #333;
            color: white;
        }

        input, select, button {
            padding: 10px;
            margin: 5px;
        }

        button {
            background: black;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<h2>Sistema de Consulta</h2>

</div>

<!-- Envía datos al backend Flask --> 
<form method="POST">

    <label>Tipo:</label>
    <select name="type">
        <option value="users">Usuarios</option>
        <option value="computers">Equipos</option>
    </select>

    <br>

    <input type="text" name="search" placeholder="Ej: pepito;maria;pc-01">

    <br>
    <br>

    <label><b>Selecciona:</b></label><br><br>

    <!-- CHECKBOX -->
     
    <div style="display:flex; gap:15px; align-items:center; justify-content:center;">

    <label><input type="checkbox" name="attributes" value="name"> Nombre</label>
    <label><input type="checkbox" name="attributes" value="email"> Email</label>
    <label><input type="checkbox" name="attributes" value="user"> Usuario</label>
    <label><input type="checkbox" name="attributes" value="DNS"> DNS</label>
    <label><input type="checkbox" name="attributes" value="SO"> SO</label>
</div>

    <br>

    <button type="submit">Buscar</button>
</form>

<hr>

{% if message %}
<p><b>{{ message }}</b></p>
{% endif %}

{% if results %}
<table>
    <tr>
        {% for col in columns %}
        <th>{{ col }}</th>
        {% endfor %}
    </tr>

    {% for row in results %}
    <tr>
        {% for col in columns %}
        <td>{{ row[col] }}</td>
        {% endfor %}
    </tr>
    {% endfor %}
</table>

<br>

<form action="/export" method="get" style="position: fixed; bottom: 20px; right: 20px;">
    <input type="hidden" name="data" value='{{ data_json }}'>
    <input type="hidden" name="columns" value='{{ columns_json }}'>
    <button type="submit">Exportar CSV</button>
</form>

{% endif %}

<div style="position:absolute; top:10px; right:20px;">
    <a href="/logout">Cerrar sesión</a>
</div>

</body>
</html>
