<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>

<!-- diseño --> 
<body style="text-align:center; font-family:Arial;">

<h2>Login</h2>

<!-- formulario_login --> 
<form method="POST">
    <input type="text" name="username" placeholder="Usuario"><br><br>
    <input type="password" name="password" placeholder="Contraseña"><br><br>
    <button type="submit">Ingresar</button>
</form>

{% if message %}
<p>{{ message }}</p>
{% endif %}

</body>
</html>
